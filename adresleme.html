<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağ Adresleme Gezgini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: monospace; } </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <a href="./index.html" class="text-blue-400 hover:underline mb-6 inline-block">← Ana Menüye Dön</a>
        <h1 class="text-4xl font-bold text-purple-400 mb-2">Ağ Adresleme Gezgini</h1>
        <p class="text-slate-400 mb-8">Bir adres yazın, sistem bu adresin Hangi OSI katmanında çalıştığını ve türünü bulsun.</p>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center">
            <input type="text" id="addressInput" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-4 text-2xl text-center text-white outline-none focus:border-purple-500 mb-4" placeholder="Örn: 192.168.1.1 veya 80 veya 00:1A:2B:3C:4D:5E">
            <button onclick="analyzeAddress()" class="bg-purple-600 hover:bg-purple-500 px-8 py-3 rounded-lg font-bold transition w-full">Adresi Analiz Et</button>
            
            <div id="resultCard" class="hidden mt-8 p-6 rounded-xl border">
                <h2 id="addrType" class="text-2xl font-black mb-2 uppercase tracking-widest"></h2>
                <p id="addrLayer" class="text-lg mb-4"></p>
                <p id="addrDesc" class="text-slate-400 text-sm italic"></p>
            </div>
        </div>
    </div>

    <script>
        function analyzeAddress() {
            const input = document.getElementById('addressInput').value.trim();
            const card = document.getElementById('resultCard');
            const typeText = document.getElementById('addrType');
            const layerText = document.getElementById('addrLayer');
            const descText = document.getElementById('addrDesc');

            card.classList.remove('hidden', 'border-red-500', 'border-blue-500', 'border-emerald-500');
            card.classList.add('bg-slate-900/50');

            const macRegex = /^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$/;
            const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            const portRegex = /^\d{1,5}$/;

            if (macRegex.test(input)) {
                card.classList.add('border-emerald-500');
                typeText.innerText = "Fiziksel (MAC) Adresi";
                typeText.className = "text-2xl font-black mb-2 text-emerald-400";
                layerText.innerText = "OSI Katmanı: 2. Veri Bağı (Data Link)";
                descText.innerText = "Cihazın Ağ Kartına (NIC) fabrikada yazılan, dünya üzerinde eşi olmayan donanım adresidir. Sadece yerel ağdaki (LAN) Switch'ler tarafından okunur.";
            } else if (ipRegex.test(input)) {
                card.classList.add('border-blue-500');
                typeText.innerText = "Mantıksal (IP) Adres";
                typeText.className = "text-2xl font-black mb-2 text-blue-400";
                layerText.innerText = "OSI Katmanı: 3. Ağ (Network)";
                descText.innerText = "Yönlendiriciler (Router) tarafından okunan adres. Verinin internet üzerinde ağdan ağa sekerek hedef ülkeye/şirkete ulaşmasını sağlar.";
            } else if (portRegex.test(input) && parseInt(input) <= 65535) {
                card.classList.add('border-amber-500');
                typeText.innerText = "Port (Soket) Adresi";
                typeText.className = "text-2xl font-black mb-2 text-amber-400";
                layerText.innerText = "OSI Katmanı: 4. Taşıma (Transport)";
                descText.innerText = "Verinin bilgisayara ulaştıktan sonra HANGİ UYGULAMAYA (Örn: 80=Web Tarayıcı, 25=E-posta) teslim edileceğini belirten kapı numarasıdır.";
            } else {
                card.classList.add('border-red-500');
                typeText.innerText = "Tanımsız Format";
                typeText.className = "text-2xl font-black mb-2 text-red-400";
                layerText.innerText = "-";
                descText.innerText = "Girdiğiniz değer standart bir MAC, IPv4 veya Port formatına uymuyor.";
            }
        }
    </script>
</body>
</html>
