<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRC (Polinom Bölmesi)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: monospace; } </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
        <a href="./index.html" class="text-blue-400 hover:underline mb-6 inline-block">← Ana Menüye Dön</a>
        <h1 class="text-4xl font-bold text-red-400 mb-2">CRC (Cyclic Redundancy Check)</h1>
        <p class="text-slate-400 mb-8">Verinin sonuna polinom derecesi kadar sıfır eklenir ve XOR (Dışlayan VEYA) bölmesi yapılarak kalan (Remainder) bulunur.</p>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Veri (Data)</label>
                    <input type="text" id="data" value="1101011011" oninput="calcCRC()" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Bölen Polinom (Generator)</label>
                    <input type="text" id="gen" value="10011" oninput="calcCRC()" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white">
                </div>
            </div>
            
            <div class="bg-slate-900 p-6 rounded-xl">
                <p class="text-slate-500 text-sm mb-2">1. Bölünen Veri (Sıfır Eklenmiş Hal):</p>
                <p id="appended" class="text-lg tracking-widest mb-4">...</p>
                
                <hr class="border-slate-700 my-4">
                
                <p class="text-red-400 text-sm font-bold mb-1">Hesaplanan CRC Kodu (Kalan):</p>
                <p id="crcResult" class="text-3xl font-bold text-white tracking-[0.2em]">...</p>
            </div>
        </div>
    </div>

    <script>
        function calcCRC() {
            let data = document.getElementById('data').value.replace(/[^01]/g, '');
            let gen = document.getElementById('gen').value.replace(/[^01]/g, '');
            
            if(!data || !gen || gen.length < 2) return;

            let appendedData = data + '0'.repeat(gen.length - 1);
            document.getElementById('appended').innerHTML = `${data}<span class="text-red-400">${'0'.repeat(gen.length - 1)}</span>`;

            // XOR Division
            let temp = appendedData.split('');
            let genArray = gen.split('');
            
            for (let i = 0; i <= temp.length - genArray.length; i++) {
                if (temp[i] === '1') {
                    for (let j = 0; j < genArray.length; j++) {
                        temp[i + j] = temp[i + j] === genArray[j] ? '0' : '1'; // XOR
                    }
                }
            }
            
            let remainder = temp.slice(-(gen.length - 1)).join('');
            document.getElementById('crcResult').innerText = remainder;
        }
        calcCRC();
    </script>
</body>
</html>
